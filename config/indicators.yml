# Shared indicator configuration — read by both backend (periods, levels)
# and frontend (colors). Single source of truth for indicator parameters.

# ── Moving averages ────────────────────────────────────────────────────────────
moving_averages:
  periods: [5, 20, 50, 100, 200]
  colors:
    5:   "#F59E0B"   # amber
    20:  "#10B981"   # emerald
    50:  "#3B82F6"   # blue
    100: "#8B5CF6"   # violet
    200: "#EF4444"   # red
  weekly_ma200_color: "#F0ABFC"  # fuchsia

# ── Fibonacci retracement ──────────────────────────────────────────────────────
fibonacci:
  levels: [0.0, 0.236, 0.382, 0.5, 0.618, 0.786, 1.0]
  colors: ["#94A3B8", "#F472B6", "#FB923C", "#FACC15", "#34D399", "#60A5FA", "#94A3B8"]
