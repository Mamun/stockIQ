# Cache TTL (time-to-live) in seconds
# Controls how long Streamlit caches each data-fetch function.
# Change a value here and restart the app — no code changes needed.

market:
  fetch_spx_quote: 60           # Live SPY price — refresh every minute
  fetch_spx_intraday: 120       # SPY bars — refresh every 2 minutes
  fetch_vix_ohlc: 3600          # VIX OHLC — refresh hourly
  fetch_vix_history: 3600       # SPY + VIX dual-axis history — refresh hourly
  fetch_index_snapshot: 120     # Major indices strip — refresh every 2 minutes

screeners:
  fetch_spx_recommendations: 3600    # Weekly/monthly candle screener
  fetch_bounce_candidates: 1800      # MA200 bounce radar — 30-min scan (expensive)
  fetch_squeeze_candidates: 3600     # Short squeeze scanner
  fetch_munger_candidates: 3600      # Munger quality watchlist
  fetch_strong_buy_candidates: 3600  # Analyst consensus strong buy
  fetch_strong_sell_candidates: 3600 # Analyst consensus strong sell
  fetch_nasdaq_oversold: 1800        # NASDAQ-100 oversold RSI scanner
  fetch_premarket_scan: 300          # Premarket movers — 5-min cache (prices change rapidly)
  fetch_premarket_history: 3600      # 7-day daily close history — refresh hourly

ai:
  fetch_ai_prediction: 3600     # Claude AI forecast — refresh hourly
